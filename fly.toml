app = "ar-photo-book-tanakon"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # นี่คือคำสั่งสำหรับรัน Prisma Migration อัตโนมัติทุกครั้งที่ Deploy
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
